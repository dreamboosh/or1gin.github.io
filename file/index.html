<!DOCTYPE html>
<html>
<head>
<title>Page Title</title>
</head>
<body>

<div id="test"></div>
<script>
const url = 'https://raw.githubusercontent.com/dreamboosh/or1gin.github.io/refs/heads/main/data.json';

async function loadData() {
  let response = await fetch(url);
  let data = await response.json();
  console.log(data);
  
  // Extract specific properties from the JSON
  let html = `
    <p>Name: ${data.name}</p>
    <p>Value: ${data.age}</p>
    <p>Description: ${data.car}</p>
  `;
  
  document.getElementById("test").innerHTML = html;
}
  
loadData();
</script>

</body>
</html>
